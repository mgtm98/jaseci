<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jac Graph Visualizer</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family:
                -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo svg {
            color: #f59e0b;
        }

        .mode-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 4px;
        }

        .mode-badge.public {
            background: #1e3a5f;
            color: #38bdf8;
            border: 1px solid #0ea5e9;
        }

        .mode-badge.user {
            background: #14532d;
            color: #4ade80;
            border: 1px solid #22c55e;
        }

        .stats {
            font-size: 12px;
            color: #94a3b8;
            padding: 3px 10px;
            background: #0f172a;
            border-radius: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            background: #334155;
            border-color: #475569;
        }

        .btn-logout {
            border-color: #ef4444;
            color: #ef4444;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: #fff;
        }

        #graph-container {
            width: 100%;
            height: calc(100vh - 49px);
            background: #0f172a;
        }

        .tooltip {
            position: absolute;
            z-index: 50;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            max-width: 320px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            display: none;
            font-size: 13px;
        }

        .tooltip-title {
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .tooltip-label {
            color: #94a3b8;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
        }

        .tooltip-id {
            color: #64748b;
            font-size: 11px;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #334155;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            gap: 12px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            gap: 8px;
        }

        .legend {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            z-index: 10;
        }

        .legend-title {
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Login modal overlay */
        .login-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .login-overlay.open {
            display: flex;
        }

        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 32px;
            width: 360px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .login-card .logo {
            justify-content: center;
            font-size: 20px;
            margin-bottom: 24px;
        }

        .login-card label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .login-card input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
        }

        .login-card input:focus {
            border-color: #3b82f6;
        }

        .login-card .login-btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .login-card .login-btn:hover {
            background: #2563eb;
        }

        .login-card .login-btn:disabled {
            background: #334155;
            cursor: not-allowed;
        }

        .login-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
        }

        .login-close:hover {
            color: #e2e8f0;
        }

        .login-error {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
            text-align: center;
        }

        .btn-login {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }

        .btn-login:hover {
            background: #2563eb;
            border-color: #2563eb;
        }
    </style>
</head>

<body>
    <!-- Login modal -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <button class="login-close" onclick="closeLogin()">&times;</button>
            <div class="logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="5" r="3" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <circle cx="6" cy="19" r="3" />
                    <circle cx="18" cy="19" r="3" />
                    <line x1="12" y1="16" x2="6" y2="16.5" />
                    <line x1="12" y1="16" x2="18" y2="16.5" />
                </svg>
                Jac Graph
            </div>
            <div class="login-error" id="login-error"></div>
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter username" />
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password" />
            <button class="login-btn" id="login-btn" onclick="doLogin()">
                Sign In
            </button>
        </div>
    </div>

    <!-- Graph page (always visible) -->
    <div class="header">
        <div class="header-left">
            <div class="logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="5" r="3" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <circle cx="6" cy="19" r="3" />
                    <circle cx="18" cy="19" r="3" />
                    <line x1="12" y1="16" x2="6" y2="16.5" />
                    <line x1="12" y1="16" x2="18" y2="16.5" />
                </svg>
                Jac Graph
            </div>
            <div class="mode-badge" id="mode-badge">Loading</div>
            <div class="stats" id="stats"></div>
        </div>
        <div class="header-right">
            <button class="btn" onclick="refreshGraph()" title="Refresh">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2v6h-6" />
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
                    <path d="M3 22v-6h6" />
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
                </svg>
                Refresh
            </button>
            <button class="btn" onclick="fitGraph()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6" />
                    <path d="M9 21H3v-6" />
                    <path d="M21 3l-7 7" />
                    <path d="M3 21l7-7" />
                </svg>
                Fit
            </button>
            <button class="btn" onclick="togglePhysics()" id="physics-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83" />
                </svg>
                Physics
            </button>
            <button class="btn btn-login" id="auth-btn" onclick="openLogin()" style="display: none">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                    <polyline points="10 17 15 12 10 7" />
                    <line x1="15" y1="12" x2="3" y2="12" />
                </svg>
                Login
            </button>
            <button class="btn btn-logout" id="logout-btn" onclick="doLogout()" style="display: none">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </button>
        </div>
    </div>
    <div id="graph-container"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
        let network = null;
        let graphData = null;
        let physicsEnabled = true;
        let authToken = localStorage.getItem("jac_token") || null;
        const baseUrl = window.location.origin;

        // Load graph immediately and update header buttons
        updateHeaderButtons();
        loadGraphData();

        // Enter key submits login
        document
            .getElementById("login-password")
            .addEventListener("keydown", function (e) {
                if (e.key === "Enter") doLogin();
            });

        function updateHeaderButtons() {
            document.getElementById("auth-btn").style.display = authToken
                ? "none"
                : "flex";
            document.getElementById("logout-btn").style.display = authToken
                ? "flex"
                : "none";
            const badge = document.getElementById("mode-badge");
            badge.textContent = authToken ? "User Graph" : "Public Graph";
            badge.className = "mode-badge " + (authToken ? "user" : "public");
        }

        function openLogin() {
            document.getElementById("login-error").style.display = "none";
            document.getElementById("login-username").value = "";
            document.getElementById("login-password").value = "";
            document.getElementById("login-overlay").classList.add("open");
        }

        function closeLogin() {
            document.getElementById("login-overlay").classList.remove("open");
        }

        async function doLogin() {
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value;
            const errEl = document.getElementById("login-error");
            const btn = document.getElementById("login-btn");
            errEl.style.display = "none";
            if (!username || !password) {
                errEl.textContent = "Username and password required";
                errEl.style.display = "block";
                return;
            }
            btn.disabled = true;
            btn.textContent = "Signing in...";
            try {
                const resp = await fetch(baseUrl + "/user/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });
                const result = await resp.json();
                if (result.ok && result.data && result.data.token) {
                    authToken = result.data.token;
                    localStorage.setItem("jac_token", authToken);
                    closeLogin();
                    updateHeaderButtons();
                    loadGraphData();
                } else {
                    errEl.textContent =
                        (result.error && result.error.message) || "Invalid credentials";
                    errEl.style.display = "block";
                }
            } catch (err) {
                errEl.textContent = "Connection failed: " + err.message;
                errEl.style.display = "block";
            }
            btn.disabled = false;
            btn.textContent = "Sign In";
        }

        function doLogout() {
            authToken = null;
            localStorage.removeItem("jac_token");
            updateHeaderButtons();
            loadGraphData();
        }

        async function loadGraphData() {
            document.getElementById("graph-container").innerHTML =
                '<div class="loading"><div class="spinner"></div><div>Loading graph data...</div></div>';
            try {
                const headers = {};
                if (authToken) {
                    headers["Authorization"] = "Bearer " + authToken;
                }
                const resp = await fetch(baseUrl + "/graph/data", { headers });
                const data = await resp.json();
                if (data.nodes && data.edges) {
                    graphData = data;
                    renderGraph(data);
                } else {
                    document.getElementById("graph-container").innerHTML =
                        '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="16"/><circle cx="6" cy="19" r="3"/><circle cx="18" cy="19" r="3"/></svg><div>No graph data available</div><div style="font-size:13px">Run your Jac program to create graph nodes</div></div>';
                }
            } catch (err) {
                document.getElementById("graph-container").innerHTML =
                    '<div class="empty-state"><div style="color:#ef4444">Failed to load graph: ' +
                    err.message +
                    "</div></div>";
            }
        }

        function getNodeColor(label, isRoot) {
            if (isRoot || label === "root")
                return { background: "#ff7743", border: "#e05a2a" };
            const match = label.match(/^([a-zA-Z0-9_]+)\(/);
            if (match) {
                let hash = 0;
                for (let c of match[1]) hash = c.charCodeAt(0) + ((hash << 5) - hash);
                const hue = Math.abs(hash % 360);
                return {
                    background: `hsl(${hue}, 60%, 50%)`,
                    border: `hsl(${hue}, 60%, 35%)`,
                };
            }
            return { background: "#3b82f6", border: "#374151" };
        }

        function getDisplayLabel(label) {
            if (label === "root") return "root";
            const nameMatch = label.match(/name='([^']+)'/);
            if (nameMatch) return nameMatch[1];
            const typeMatch = label.match(/^([a-zA-Z0-9_]+)\(/);
            if (typeMatch) return typeMatch[1];
            return label.length > 20 ? label.substring(0, 17) + "..." : label;
        }

        function getEdgeLabel(label) {
            if (!label) return "";
            const m = label.match(/='([a-zA-Z0-9_]+)'/);
            return m ? m[1] : "";
        }

        function renderGraph(data) {
            const container = document.getElementById("graph-container");
            container.innerHTML = "";

            const nodeTypes = new Map();
            const nodes = new vis.DataSet(
                data.nodes.map((n) => {
                    const isRoot = n.label === "root";
                    const colors = getNodeColor(n.label, isRoot);
                    const display = getDisplayLabel(n.label);
                    // Track node types for legend
                    const typeMatch = n.label.match(/^([a-zA-Z0-9_]+)\(/);
                    const typeName = isRoot
                        ? "root"
                        : typeMatch
                            ? typeMatch[1]
                            : "other";
                    if (!nodeTypes.has(typeName))
                        nodeTypes.set(typeName, colors.background);
                    return {
                        id: n.id,
                        label: display,
                        color: {
                            background: colors.background,
                            border: colors.border,
                            highlight: { background: "#f59e0b", border: "#f59e0b" },
                        },
                        font: { color: "#ffffff", size: 13 },
                        _rawLabel: n.label,
                        _rawId: n.id,
                    };
                }),
            );

            const edges = new vis.DataSet(
                data.edges.map((e, i) => ({
                    id: "edge_" + i,
                    from: e.from,
                    to: e.to,
                    label: getEdgeLabel(e.label),
                    title: e.label || "connection",
                    arrows: "to",
                    color: { color: "#64748b", opacity: 0.8 },
                    font: {
                        color: "#94a3b8",
                        size: 11,
                        strokeWidth: 2,
                        strokeColor: "#0f172a",
                        align: "top",
                    },
                })),
            );

            const options = {
                autoResize: true,
                nodes: {
                    shape: "dot",
                    size: 25,
                    borderWidth: 2,
                    shadow: { enabled: true, color: "rgba(0,0,0,0.3)", size: 8 },
                },
                edges: {
                    width: 2,
                    smooth: { type: "continuous", forceDirection: "none" },
                    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                },
                physics: {
                    enabled: true,
                    solver: "forceAtlas2Based",
                    forceAtlas2Based: {
                        gravitationalConstant: -50,
                        centralGravity: 0.01,
                        springLength: 120,
                        springConstant: 0.08,
                        damping: 0.4,
                        avoidOverlap: 0.8,
                    },
                    stabilization: {
                        enabled: true,
                        iterations: 200,
                        updateInterval: 25,
                        fit: true,
                    },
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    zoomView: true,
                    dragView: true,
                    dragNodes: true,
                },
                layout: { improvedLayout: true },
            };

            network = new vis.Network(container, { nodes, edges }, options);

            // Tooltip handling
            const tooltip = document.getElementById("tooltip");
            network.on("hoverNode", function (e) {
                const nodeData = nodes.get(e.node);
                if (!nodeData) return;
                const pos = e.event.center || {
                    x: e.pointer.DOM.x,
                    y: e.pointer.DOM.y,
                };
                tooltip.innerHTML =
                    '<div class="tooltip-title">' +
                    getDisplayLabel(nodeData._rawLabel) +
                    "</div>" +
                    '<div class="tooltip-label">' +
                    nodeData._rawLabel +
                    "</div>" +
                    '<div class="tooltip-id">ID: ' +
                    nodeData._rawId +
                    "</div>";
                tooltip.style.left =
                    Math.min(pos.x + 15, window.innerWidth - 340) + "px";
                tooltip.style.top = pos.y + 60 + "px";
                tooltip.style.display = "block";
                container.style.cursor = "pointer";
            });
            network.on("blurNode", function () {
                tooltip.style.display = "none";
                container.style.cursor = "grab";
            });
            network.on("dragStart", function () {
                container.style.cursor = "grabbing";
            });
            network.on("dragEnd", function () {
                container.style.cursor = "grab";
            });
            network.on("stabilized", function () {
                network.fit({
                    animation: { duration: 300, easingFunction: "easeInOutQuad" },
                });
            });

            // Stats
            document.getElementById("stats").textContent =
                data.nodes.length + " nodes, " + data.edges.length + " edges";
            container.style.cursor = "grab";

            // Add legend
            if (nodeTypes.size > 0) {
                let legendEl = document.getElementById("graph-legend");
                if (!legendEl) {
                    legendEl = document.createElement("div");
                    legendEl.id = "graph-legend";
                    legendEl.className = "legend";
                    container.appendChild(legendEl);
                }
                let html = '<div class="legend-title">Node Types</div>';
                nodeTypes.forEach((color, type) => {
                    html +=
                        '<div class="legend-item"><div class="legend-color" style="background:' +
                        color +
                        '"></div>' +
                        type +
                        "</div>";
                });
                legendEl.innerHTML = html;
            }
        }

        function refreshGraph() {
            loadGraphData();
        }
        function fitGraph() {
            if (network)
                network.fit({
                    animation: { duration: 500, easingFunction: "easeInOutQuad" },
                });
        }
        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (network)
                network.setOptions({ physics: { enabled: physicsEnabled } });
            document.getElementById("physics-btn").style.borderColor =
                physicsEnabled ? "#334155" : "#f59e0b";
        }
    </script>
</body>

</html>
